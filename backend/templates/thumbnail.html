<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 720px;
    height: 1280px;
    overflow: hidden;
    background: transparent;
    position: relative;
  }

  .canvas {
    width: 720px;
    height: 1280px;
    position: relative;
    overflow: hidden;
  }

  /* Background: clear frame fills entire canvas */
  .bg-layer {
    position: absolute;
    top: 0; left: 0;
    width: 720px;
    height: 1280px;
    background-size: cover;
    background-position: center;
    z-index: 1;
  }

  /* Dark gradient overlay for dramatic effect */
  .gradient-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      180deg,
      rgba(0, 0, 0, 0.6) 0%,
      rgba(0, 0, 0, 0.25) 30%,
      rgba(0, 0, 0, 0.15) 50%,
      rgba(0, 0, 0, 0.35) 70%,
      rgba(0, 0, 0, 0.75) 100%
    );
    z-index: 2;
  }

  /* Radial glow behind the speaker */
  .radial-glow {
    display: none;
  }

  /* Speaker/foreground frame */
  .speaker-layer {
    display: none;
  }

  /* Title text container - positioned at top */
  .title-container {
    position: absolute;
    top: 150px;
    left: 40px;
    right: 40px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* ==========================================
     TEXT STYLES
     ========================================== */

  /* 1. Classic Style (Default fallback) */
  .canvas.style-classic .title-line,
  .title-line {
    font-family: 'Anton', 'Impact', sans-serif;
    font-size: 115px;
    font-weight: 400;
    text-transform: uppercase;
    line-height: 0.92;
    letter-spacing: 2px;
    color: #FFFFFF;
    -webkit-text-stroke: 5px #000000;
    paint-order: stroke fill;
    text-shadow:
      0 0 10px rgba(0, 0, 0, 0.8),
      0 4px 8px rgba(0, 0, 0, 0.6),
      0 0 40px rgba(0, 0, 0, 0.4);
  }

  .canvas.style-classic .title-line.highlight,
  .title-line.highlight {
    color: #FFD700;
    -webkit-text-stroke: 4px #000000;
    text-shadow:
      0 0 15px rgba(255, 215, 0, 0.5),
      0 0 30px rgba(255, 215, 0, 0.3),
      0 4px 8px rgba(0, 0, 0, 0.6);
  }

  .canvas.style-classic .badge-highlight,
  .badge-highlight {
    display: inline-block;
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #000000;
    -webkit-text-stroke: 0px;
    padding: 4px 16px;
    border-radius: 8px;
    font-family: 'Montserrat', sans-serif;
    font-size: 32px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-shadow: none;
    box-shadow: 0 4px 15px rgba(255, 165, 0, 0.4);
    margin-bottom: 4px;
  }

  /* 2. Cyber Style (Futuristic Gamer) */
  .canvas.style-cyber .title-line {
    font-family: 'Montserrat', sans-serif;
    font-size: 100px;
    font-weight: 900;
    text-transform: uppercase;
    line-height: 0.92;
    letter-spacing: 1px;
    color: #00f3ff;
    -webkit-text-stroke: 3px #000000;
    paint-order: stroke fill;
    text-shadow:
      0 0 8px rgba(0, 243, 255, 0.8),
      0 0 20px rgba(0, 243, 255, 0.4),
      0 4px 8px rgba(0, 0, 0, 0.7);
  }

  .canvas.style-cyber .title-line.highlight {
    color: #ff00ea;
    text-shadow:
      0 0 8px rgba(255, 0, 234, 0.8),
      0 0 20px rgba(255, 0, 234, 0.4),
      0 4px 8px rgba(0, 0, 0, 0.7);
  }

  .canvas.style-cyber .badge-highlight {
    display: inline-block;
    background: linear-gradient(135deg, #00f3ff, #ff00ea);
    color: #FFFFFF;
    -webkit-text-stroke: 0px;
    padding: 4px 16px;
    border-radius: 8px;
    font-family: 'Montserrat', sans-serif;
    font-size: 32px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
    box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
    margin-bottom: 4px;
  }

  /* 3. Bubble Style (Comic / Anime / Manga) */
  .canvas.style-bubble .title-container {
    transform: skewY(-3deg) rotate(-3deg);
  }

  .canvas.style-bubble .title-line {
    font-family: 'Anton', 'Impact', sans-serif;
    font-size: 120px;
    font-weight: 400;
    text-transform: uppercase;
    line-height: 0.92;
    letter-spacing: 2px;
    color: #ffe600;
    -webkit-text-stroke: 7px #000000;
    paint-order: stroke fill;
    text-shadow: 7px 7px 0px #000000;
  }

  .canvas.style-bubble .title-line.highlight {
    color: #ff3c00;
    -webkit-text-stroke: 6px #000000;
    text-shadow: 6px 6px 0px #000000;
  }

  .canvas.style-bubble .badge-highlight {
    display: inline-block;
    background: #000000;
    color: #ffe600;
    -webkit-text-stroke: 0px;
    padding: 4px 16px;
    border: 3px solid #ffe600;
    border-radius: 8px;
    font-family: 'Anton', sans-serif;
    font-size: 36px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-shadow: none;
    box-shadow: 6px 6px 0px #000000;
    margin-bottom: 6px;
  }

  /* Bottom brand watermark */
  .watermark {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="bg-layer" id="bgLayer"></div>
    <div class="gradient-overlay"></div>
    <div class="radial-glow"></div>
    <img class="speaker-layer" id="speakerImg" />
    <div class="title-container" id="titleContainer">
      <!-- Title lines will be injected by Puppeteer -->
    </div>
  </div>
</body>
</html>
